<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Title</title>
</head>

<body>
    <header>
        <h1>Etch-a-sketch</h1>
    </header>
    <div class="main">
        <div class="options">
            <input type="color" id="color-picker" value="#e66465">
            <button class="option">Choose a color</button>
            <button class="option">Random colors</button>
            <button class="option">Eraser</button>
            <button class="option">Clear</button>
            <input type="range" min="1" max="64" value="16" id="range-slider">
            <span id="slider-value">Value</span>
        </div>
        <div class="grid">
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
            <div class="pixel"></div>
        </div>
    </div>
</body>

</html>
